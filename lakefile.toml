# ============================================================
# lakefile.toml
# ============================================================

# REQ.FILE.PROJECT.IDENTITY
#   Declares the externally visible identity and build surface of this package.
#   Sections marked CUSTOM are expected to vary by repository.

# === REQUIRED PROJECT IDENTITY ===

name = "se-theory-transformation"
version = "0.2.0"
license = "MIT"

# === BUILD CONFIGURATION ===

defaultTargets = ["SETheoryTransformation"]

# === EXPORT LIBRARY (public, exported) ===

[[lean_lib]]
name = "SETheoryTransformation"
srcDir = "."
roots = ["SETheoryTransformation"]

# === TEST LIBRARIES (internal, not exported) ===

[[lean_lib]]
name = "TestAll"
srcDir = "test"
roots = ["TestAll"]

[[lean_lib]]
name = "TestAdmissibility"
srcDir = "test"

[[lean_lib]]
name = "TestComposition"
srcDir = "test"

[[lean_lib]]
name = "TestOrthogonality"
srcDir = "test"
