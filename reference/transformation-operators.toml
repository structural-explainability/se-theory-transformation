# ============================================================
# Transformation Operators
# se-theory-transformation
# ============================================================
# Canonical operator definitions: code, label, family, kind,
# and description.
#
# Order matches SETheoryTransformation.Registry.referenceOperators.
# Labels match SETheoryTransformation.Domain.Operator.Labels.
# Families match SETheoryTransformation.Domain.Operator.Semantics.operatorFamily.
# Kinds are derived transitively by familyKind.
#
# STATUS: draft
# Confirmed:
#   code    - from Domain/Operator/Codes.lean
#   label   - from Domain/Operator/Labels.lean
#   family  - from Domain/Operator/Semantics.lean
#   kind    - derived from familyKind in Domain/Operator/Semantics.lean
#
# This file does not define persistence behavior.

[meta]
source = "se-theory-transformation"
namespace = "se.transformation"
artifact = "transformation-operators"
version = "0.1.0"
status = "draft"

[operator.AT]
order = 1
code = "AT"
label = "attest"
family = "attestation"
kind = "observational"
description = "Records a verified claim about a referent. Adds attestation metadata or evidence without defining persistence behavior."

[operator.AZ]
order = 2
code = "AZ"
label = "authorize"
family = "normative"
kind = "normative"
description = "Grants permission, authority, or normative standing to a subject or referent within a defined scope."

[operator.BD]
order = 3
code = "BD"
label = "bind"
family = "contextual"
kind = "contextual"
description = "Associates a referent with a context, bearer, scope, or applicability setting."

[operator.BR]
order = 4
code = "BR"
label = "branch"
family = "branching"
kind = "temporal"
description = "Creates a divergent continuation from a referent, producing one or more forward paths."

[operator.CL]
order = 5
code = "CL"
label = "collapse"
family = "scaling"
kind = "structural"
description = "Reduces structural scale or complexity by collapsing nested, redundant, or expanded structure."

[operator.CP]
order = 6
code = "CP"
label = "copy"
family = "replication"
kind = "observational"
description = "Produces a duplicate, replica, or copied representation of a referent."

[operator.EM]
order = 7
code = "EM"
label = "embed"
family = "containment"
kind = "organizational"
description = "Places a referent inside a containing structure, establishing containment or embedded placement."

[operator.EX]
order = 8
code = "EX"
label = "expand"
family = "scaling"
kind = "structural"
description = "Increases structural scale, detail, or complexity by expanding a referent into a more elaborated form."

[operator.LK]
order = 9
code = "LK"
label = "link"
family = "association"
kind = "relational"
description = "Establishes an association or relation between referents without by itself implying containment or persistence."

[operator.MG]
order = 10
code = "MG"
label = "merge"
family = "aggregation"
kind = "structural"
description = "Combines two or more referents or structural components into a unified referent or aggregate."

[operator.PR]
order = 11
code = "PR"
label = "project"
family = "projection"
kind = "observational"
description = "Derives a partial view, projection, or selected representation of a referent."

[operator.RO]
order = 12
code = "RO"
label = "reorder"
family = "reorganization"
kind = "organizational"
description = "Changes the ordering or arrangement of components without necessarily changing their membership."

[operator.RV]
order = 13
code = "RV"
label = "revert"
family = "versioning"
kind = "temporal"
description = "Returns, restores, or relates a referent to a prior version along a provenance or version chain."

[operator.SH]
order = 14
code = "SH"
label = "shift"
family = "migration"
kind = "relational"
description = "Relocates a referent across a relation, bearer, context, or structural position while maintaining linkage."

[operator.SP]
order = 15
code = "SP"
label = "split"
family = "decomposition"
kind = "structural"
description = "Divides a referent into two or more components, parts, branches, or sub-referents."

[operator.UB]
order = 16
code = "UB"
label = "unbind"
family = "contextual"
kind = "contextual"
description = "Removes, releases, or severs a contextual binding between a referent and its current context, bearer, or scope."

[operator.VS]
order = 17
code = "VS"
label = "version"
family = "versioning"
kind = "temporal"
description = "Produces or identifies a temporally ordered version or successor of a referent."
